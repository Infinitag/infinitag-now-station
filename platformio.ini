[env:esp32-s3-devkitc-1]
platform    = espressif32
board       = esp32-s3-devkitc-1
framework   = arduino

; 16 MB Flash, eigene Partitionstabelle
board_upload.flash_size      = 16MB
board_build.partitions       = partitions_16MB.csv
board_build.filesystem       = littlefs

; USB-Flags entfernt – CDC-Boot verursachte Reset-Loop auf diesem Board
; Serial läuft jetzt über Hardware-UART (USB-UART-Chip auf dem DevKitC)
monitor_speed  = 115200

; Nach jedem Upload automatisch auch LittleFS flashen
;extra_scripts  = post:scripts/upload_fs_after_upload.py

; Libraries
;   U8g2            = SH1106-OLED-Treiber (1,3" 128x64, I²C)
;   Adafruit_NeoPixel = SK6812RGBW Treiber (Plan v7 GPIO 6)
lib_deps =
    olikraus/U8g2 @ ^2.35.30
    adafruit/Adafruit NeoPixel @ ^1.12.0
