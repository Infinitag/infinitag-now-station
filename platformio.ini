[platformio]
; Build-Artefakte auf die lokale Platte statt aufs SMB-Share: offene
; Datei-Handles anderer Prozesse (z. B. Claude-Sandbox-VM) machten aus
; geloeschten Build-Dateien .smbdelete-Platzhalter -> Deploy-Fehler.
workspace_dir = ~/.pio-workspaces/infinitag-now-station

[env:esp32-s3-devkitc-1]
platform    = espressif32
board       = esp32-s3-devkitc-1
framework   = arduino

; 16 MB Flash, eigene Partitionstabelle
board_upload.flash_size      = 16MB
board_build.partitions       = partitions_16MB.csv
board_build.filesystem       = littlefs

; USB-Flags entfernt – CDC-Boot verursachte Reset-Loop auf diesem Board
; Serial läuft jetzt über Hardware-UART (USB-UART-Chip auf dem DevKitC)
monitor_speed  = 115200

; Nach jedem Upload automatisch auch LittleFS flashen
;extra_scripts  = post:scripts/upload_fs_after_upload.py

; Libraries
;   U8g2            = SH1106-OLED-Treiber (1,3" 128x64, I²C)
;   Adafruit_NeoPixel = SK6812RGBW Treiber (Plan v7 GPIO 6)
lib_deps =
    olikraus/U8g2 @ ^2.35.30
    adafruit/Adafruit NeoPixel @ ^1.12.0
    ; Core-Lib als Symlink auf die lokale Arbeitskopie: immer aktueller
    ; Stand, kein Cache-Drift, kein Push noetig. Fuer Builds ausserhalb
    ; des NAS-Setups stattdessen den Tag pinnen:
    ;   https://github.com/Infinitag/infinitag-now-core.git#v2.0.0
    symlink:///Volumes/Basteln/Infinitag/repos/infinitag-now-core
